  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<title>Pattern Generator<\u002Ftitle>\n\n<style>\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  :root {\n    --bg: #f5f4f0;\n    --panel: #fafaf8;\n    --border: #d8d6d0;\n    --text: #2a2825;\n    --muted: #888580;\n    --accent: oklch(55% 0.12 250);\n    --panel-w: 280px;\n  }\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-size: 12px;\n    display: flex;\n    height: 100vh;\n    overflow: hidden;\n  }\n  #panel {\n    width: var(--panel-w);\n    flex-shrink: 0;\n    background: var(--panel);\n    border-right: 1px solid var(--border);\n    display: flex;\n    flex-direction: column;\n    overflow: hidden;\n  }\n  #panel-header {\n    padding: 16px 16px 12px;\n    border-bottom: 1px solid var(--border);\n    display: flex;\n    align-items: baseline;\n    gap: 8px;\n  }\n  #panel-header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }\n  #panel-scroll {\n    flex: 1;\n    overflow-y: auto;\n    padding: 12px 0;\n  }\n  #panel-scroll::-webkit-scrollbar { width: 4px; }\n  #panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }\n  .section {\n    padding: 0 16px 12px;\n    border-bottom: 1px solid var(--border);\n    margin-bottom: 2px;\n  }\n  .section:last-child { border-bottom: none; }\n  .section-title {\n    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--muted);\n    margin-bottom: 8px; padding-top: 10px;\n  }\n  .row {\n    display: flex; align-items: center; gap: 8px; margin-bottom: 7px;\n  }\n  .row label { flex: 0 0 100px; color: var(--text); font-size: 11.5px; }\n  .row .val {\n    flex: 0 0 34px; text-align: right; color: var(--muted);\n    font-size: 11px; font-variant-numeric: tabular-nums;\n  }\n  input[type=range] {\n    flex: 1; -webkit-appearance: none; height: 3px;\n    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;\n  }\n  input[type=range]::-webkit-slider-thumb {\n    -webkit-appearance: none; width: 12px; height: 12px;\n    border-radius: 50%; background: var(--text); cursor: pointer;\n  }\n  input[type=range]::-webkit-slider-thumb:hover { background: var(--accent); }\n  select, input[type=color] {\n    flex: 1; font-family: inherit; font-size: 11.5px;\n    background: #fff; border: 1px solid var(--border);\n    border-radius: 4px; padding: 4px 6px; color: var(--text);\n    cursor: pointer; outline: none;\n  }\n  select:focus { border-color: var(--accent); }\n  input[type=color] {\n    padding: 2px; height: 26px; width: 40px;\n    flex: 0 0 40px; border-radius: 4px;\n  }\n  .color-row {\n    display: flex; align-items: center; gap: 8px; margin-bottom: 7px;\n  }\n  .color-row label { flex: 0 0 100px; font-size: 11.5px; }\n  .chips {\n    display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px;\n  }\n  .chip {\n    padding: 4px 9px; border: 1px solid var(--border);\n    border-radius: 20px; font-size: 11px; cursor: pointer;\n    background: #fff; transition: all 0.12s; user-select: none;\n  }\n  .chip:hover { border-color: var(--text); }\n  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }\n  #panel-footer {\n    padding: 10px 16px; border-top: 1px solid var(--border);\n    display: flex; gap: 6px; flex-wrap: wrap;\n  }\n  button {\n    flex: 1; padding: 7px; font-family: inherit; font-size: 11.5px;\n    border-radius: 5px; cursor: pointer; border: 1px solid var(--border);\n    background: #fff; color: var(--text); transition: all 0.12s; min-width: 60px;\n  }\n  button:hover { border-color: var(--text); }\n  button.primary { background: var(--text); color: #fff; border-color: var(--text); }\n  button.primary:hover { background: #444; }\n  #canvas-area {\n    flex: 1; display: flex; align-items: center; justify-content: center;\n    background: var(--bg); overflow: hidden; padding: 24px;\n  }\n  #canvas-wrap { box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; }\n  canvas { display: block; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"panel\">\n  <div id=\"panel-header\">\n    <h1>Pattern Generator<\u002Fh1>\n  <\u002Fdiv>\n\n  <div id=\"panel-scroll\">\n\n    <!-- MODE -->\n    <div class=\"section\">\n      <div class=\"section-title\">Field Mode<\u002Fdiv>\n      <div class=\"chips\">\n        <div class=\"chip active\" data-mode=\"gradient\">Gradient<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"flow\">Flow Field<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"length\">Length Map<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"radial\">Radial Fan<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"wave\">Wave<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"concentric\">Concentric<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"dotdash\">Dot → Dash<\u002Fdiv>\n        <div class=\"chip\" data-mode=\"pixel\">Pixel<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- GRID -->\n    <div class=\"section\">\n      <div class=\"section-title\">Grid<\u002Fdiv>\n      <div class=\"row\">\n        <label>Spacing X<\u002Flabel>\n        <input type=\"range\" id=\"spacingX\" min=\"4\" max=\"80\" step=\"1\" value=\"30\">\n        <span class=\"val\" id=\"spacingX_v\">30<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Spacing Y<\u002Flabel>\n        <input type=\"range\" id=\"spacingY\" min=\"4\" max=\"80\" step=\"1\" value=\"28\">\n        <span class=\"val\" id=\"spacingY_v\">28<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Jitter<\u002Flabel>\n        <input type=\"range\" id=\"jitter\" min=\"0\" max=\"1\" step=\"0.01\" value=\"0\">\n        <span class=\"val\" id=\"jitter_v\">0.00<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ELEMENT -->\n    <div class=\"section\">\n      <div class=\"section-title\">Element<\u002Fdiv>\n      <div class=\"row\" id=\"row_dashLen\">\n        <label>Base length<\u002Flabel>\n        <input type=\"range\" id=\"dashLen\" min=\"2\" max=\"60\" step=\"0.5\" value=\"16\">\n        <span class=\"val\" id=\"dashLen_v\">16<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"row_lenVary\">\n        <label>Length vary<\u002Flabel>\n        <input type=\"range\" id=\"lenVary\" min=\"0\" max=\"1\" step=\"0.01\" value=\"0.2\">\n        <span class=\"val\" id=\"lenVary_v\">0.20<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"row_minLen\">\n        <label>Min length<\u002Flabel>\n        <input type=\"range\" id=\"minLen\" min=\"0\" max=\"1\" step=\"0.01\" value=\"0.05\">\n        <span class=\"val\" id=\"minLen_v\">0.05<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"row_pixelSize\">\n        <label>Max size<\u002Flabel>\n        <input type=\"range\" id=\"pixelSize\" min=\"0.1\" max=\"2\" step=\"0.05\" value=\"0.9\">\n        <span class=\"val\" id=\"pixelSize_v\">0.90<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"row_strokeW\">\n        <label>Stroke weight<\u002Flabel>\n        <input type=\"range\" id=\"strokeW\" min=\"0.3\" max=\"5\" step=\"0.1\" value=\"1.1\">\n        <span class=\"val\" id=\"strokeW_v\">1.1<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"row_roundCaps\">\n        <label>Round caps<\u002Flabel>\n        <input type=\"range\" id=\"roundCaps\" min=\"0\" max=\"1\" step=\"1\" value=\"0\">\n        <span class=\"val\" id=\"roundCaps_v\">off<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"row_squareEl\">\n        <label>Square (px)<\u002Flabel>\n        <input type=\"range\" id=\"squareEl\" min=\"0\" max=\"1\" step=\"1\" value=\"1\">\n        <span class=\"val\" id=\"squareEl_v\">on<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ANGLE -->\n    <div class=\"section\" id=\"angleSection\">\n      <div class=\"section-title\">Angle<\u002Fdiv>\n      <div class=\"row\">\n        <label>Base angle °<\u002Flabel>\n        <input type=\"range\" id=\"baseAngle\" min=\"-180\" max=\"180\" step=\"1\" value=\"-45\">\n        <span class=\"val\" id=\"baseAngle_v\">-45<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Angle range °<\u002Flabel>\n        <input type=\"range\" id=\"angleRange\" min=\"0\" max=\"360\" step=\"1\" value=\"90\">\n        <span class=\"val\" id=\"angleRange_v\">90<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"axisRow\">\n        <label>Axis<\u002Flabel>\n        <select id=\"axis\">\n          <option value=\"y\">Y (top→bottom)<\u002Foption>\n          <option value=\"x\">X (left→right)<\u002Foption>\n          <option value=\"xy\">Diagonal<\u002Foption>\n          <option value=\"radial\">From center<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CONCENTRIC -->\n    <div class=\"section\" id=\"concentricSection\">\n      <div class=\"section-title\">Concentric<\u002Fdiv>\n      <div class=\"row\">\n        <label>Ring radius<\u002Flabel>\n        <input type=\"range\" id=\"ringRadius\" min=\"0.05\" max=\"0.8\" step=\"0.01\" value=\"0.25\">\n        <span class=\"val\" id=\"ringRadius_v\">0.25<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Ring aspect<\u002Flabel>\n        <input type=\"range\" id=\"ringAspect\" min=\"0.2\" max=\"3\" step=\"0.05\" value=\"1.5\">\n        <span class=\"val\" id=\"ringAspect_v\">1.50<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Ring softness<\u002Flabel>\n        <input type=\"range\" id=\"ringSoft\" min=\"0.01\" max=\"1\" step=\"0.01\" value=\"0.25\">\n        <span class=\"val\" id=\"ringSoft_v\">0.25<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Cx offset<\u002Flabel>\n        <input type=\"range\" id=\"ringCx\" min=\"-0.4\" max=\"0.4\" step=\"0.01\" value=\"0\">\n        <span class=\"val\" id=\"ringCx_v\">0.00<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Cy offset<\u002Flabel>\n        <input type=\"range\" id=\"ringCy\" min=\"-0.4\" max=\"0.4\" step=\"0.01\" value=\"0\">\n        <span class=\"val\" id=\"ringCy_v\">0.00<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DOT/DASH -->\n    <div class=\"section\" id=\"dotdashSection\">\n      <div class=\"section-title\">Dot → Dash<\u002Fdiv>\n      <div class=\"row\">\n        <label>Dot size<\u002Flabel>\n        <input type=\"range\" id=\"dotSize\" min=\"0.5\" max=\"8\" step=\"0.1\" value=\"2.5\">\n        <span class=\"val\" id=\"dotSize_v\">2.5<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Dash length<\u002Flabel>\n        <input type=\"range\" id=\"dashLenDD\" min=\"2\" max=\"40\" step=\"0.5\" value=\"12\">\n        <span class=\"val\" id=\"dashLenDD_v\">12<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Threshold<\u002Flabel>\n        <input type=\"range\" id=\"ddThresh\" min=\"-1\" max=\"1\" step=\"0.01\" value=\"0\">\n        <span class=\"val\" id=\"ddThresh_v\">0.00<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Edge blur<\u002Flabel>\n        <input type=\"range\" id=\"ddBlur\" min=\"0.01\" max=\"1\" step=\"0.01\" value=\"0.3\">\n        <span class=\"val\" id=\"ddBlur_v\">0.30<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>DD angle °<\u002Flabel>\n        <input type=\"range\" id=\"ddAngle\" min=\"-180\" max=\"180\" step=\"1\" value=\"0\">\n        <span class=\"val\" id=\"ddAngle_v\">0<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FIELD -->\n    <div class=\"section\" id=\"fieldSection\">\n      <div class=\"section-title\">Field / Noise<\u002Fdiv>\n      <div class=\"row\">\n        <label>Scale<\u002Flabel>\n        <input type=\"range\" id=\"noiseScale\" min=\"0.001\" max=\"0.025\" step=\"0.0005\" value=\"0.006\">\n        <span class=\"val\" id=\"noiseScale_v\">0.006<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Strength<\u002Flabel>\n        <input type=\"range\" id=\"noiseStr\" min=\"0\" max=\"3\" step=\"0.05\" value=\"1.5\">\n        <span class=\"val\" id=\"noiseStr_v\">1.50<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Octaves<\u002Flabel>\n        <input type=\"range\" id=\"octaves\" min=\"1\" max=\"6\" step=\"1\" value=\"3\">\n        <span class=\"val\" id=\"octaves_v\">3<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Seed<\u002Flabel>\n        <input type=\"range\" id=\"seed\" min=\"0\" max=\"200\" step=\"1\" value=\"42\">\n        <span class=\"val\" id=\"seed_v\">42<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"waveRow\">\n        <label>Frequency<\u002Flabel>\n        <input type=\"range\" id=\"waveFreq\" min=\"0.5\" max=\"10\" step=\"0.1\" value=\"2\">\n        <span class=\"val\" id=\"waveFreq_v\">2.0<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"radRow\">\n        <label>Cx offset<\u002Flabel>\n        <input type=\"range\" id=\"radCx\" min=\"-1\" max=\"1\" step=\"0.02\" value=\"0\">\n        <span class=\"val\" id=\"radCx_v\">0.00<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\" id=\"radRow2\">\n        <label>Cy offset<\u002Flabel>\n        <input type=\"range\" id=\"radCy\" min=\"-1\" max=\"1\" step=\"0.02\" value=\"0\">\n        <span class=\"val\" id=\"radCy_v\">0.00<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- COLORS -->\n    <div class=\"section\">\n      <div class=\"section-title\">Color<\u002Fdiv>\n      <div class=\"color-row\">\n        <label>Background<\u002Flabel>\n        <input type=\"color\" id=\"bgColor\" value=\"#ffffff\">\n      <\u002Fdiv>\n      <div class=\"color-row\">\n        <label>Stroke<\u002Flabel>\n        <input type=\"color\" id=\"strokeColor\" value=\"#1a1a1a\">\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Opacity<\u002Flabel>\n        <input type=\"range\" id=\"opacity\" min=\"0.1\" max=\"1\" step=\"0.01\" value=\"1\">\n        <span class=\"val\" id=\"opacity_v\">1.00<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CANVAS SIZE -->\n    <div class=\"section\">\n      <div class=\"section-title\">Canvas<\u002Fdiv>\n      <div class=\"row\">\n        <label>Width<\u002Flabel>\n        <input type=\"range\" id=\"cWidth\" min=\"200\" max=\"1600\" step=\"10\" value=\"700\">\n        <span class=\"val\" id=\"cWidth_v\">700<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <label>Height<\u002Flabel>\n        <input type=\"range\" id=\"cHeight\" min=\"200\" max=\"1600\" step=\"10\" value=\"900\">\n        <span class=\"val\" id=\"cHeight_v\">900<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><!-- /panel-scroll -->\n\n  <div id=\"panel-footer\">\n    <div style=\"width:100%;margin-bottom:6px\">\n      <div style=\"font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px\">Randomize by mode<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:3px\">\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('gradient')\" title=\"Gradient\">Grad<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('flow')\" title=\"Flow Field\">Flow<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('length')\" title=\"Length Map\">Len<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('radial')\" title=\"Radial Fan\">Rad<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('wave')\" title=\"Wave\">Wave<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('concentric')\" title=\"Concentric\">Conc<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('dotdash')\" title=\"Dot→Dash\">D→D<\u002Fbutton>\n        <button style=\"flex:0 0 auto;padding:4px 7px;font-size:10px\" onclick=\"randomizeMode('pixel')\" title=\"Pixel\">Pix<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button onclick=\"randomizeMix()\" title=\"Pick a random mode and fully randomize it\">Mix All<\u002Fbutton>\n    <button class=\"primary\" onclick=\"exportPNG()\">PNG<\u002Fbutton>\n    <button class=\"primary\" onclick=\"exportSVG()\">SVG<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv><!-- /panel -->\n\n<div id=\"canvas-area\">\n  <div id=\"canvas-wrap\">\n    <canvas id=\"c\"><\u002Fcanvas>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ─────────────────────────────────────────────\n// PERLIN NOISE\n// ─────────────────────────────────────────────\nconst PERM = new Uint8Array(512);\nlet currentSeed = 42;\n\nfunction seedNoise(s) {\n  currentSeed = s | 0;\n  let v = currentSeed;\n  const p = new Uint8Array(256);\n  for (let i = 0; i < 256; i++) p[i] = i;\n  for (let i = 255; i > 0; i--) {\n    v = (v * 1664525 + 1013904223) & 0xffffffff;\n    const j = ((v >>> 0) % (i + 1));\n    [p[i], p[j]] = [p[j], p[i]];\n  }\n  for (let i = 0; i < 512; i++) PERM[i] = p[i & 255];\n}\nfunction fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }\nfunction lerp(a, b, t) { return a + t * (b - a); }\nfunction grad(h, x, y) {\n  const v = h & 3;\n  const u = v < 2 ? x : y, w = v < 2 ? y : x;\n  return ((v & 1) ? -u : u) + ((v & 2) ? -w : w);\n}\nfunction noise2(x, y) {\n  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;\n  x -= Math.floor(x); y -= Math.floor(y);\n  const u = fade(x), v = fade(y);\n  const a = PERM[X] + Y, b = PERM[X + 1] + Y;\n  return lerp(\n    lerp(grad(PERM[a], x, y), grad(PERM[b], x-1, y), u),\n    lerp(grad(PERM[a+1], x, y-1), grad(PERM[b+1], x-1, y-1), u), v\n  );\n}\nfunction fbm(x, y, oct) {\n  let val = 0, amp = 0.5, freq = 1, max = 0;\n  for (let i = 0; i < oct; i++) {\n    val += noise2(x * freq, y * freq) * amp;\n    max += amp; amp *= 0.5; freq *= 2.1;\n  }\n  return val / max;\n}\n\n// ─────────────────────────────────────────────\n// STATE\n// ─────────────────────────────────────────────\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"mode\": \"length\",\n  \"spacingX\": 18,\n  \"spacingY\": 23,\n  \"jitter\": 0.1,\n  \"dashLen\": 12.8,\n  \"lenVary\": 0.11,\n  \"minLen\": 0.06,\n  \"pixelSize\": 0.48,\n  \"strokeW\": 2.1,\n  \"roundCaps\": 0,\n  \"squareEl\": 0,\n  \"baseAngle\": -114,\n  \"angleRange\": 294,\n  \"axis\": \"x\",\n  \"ringRadius\": 0.51,\n  \"ringAspect\": 1.95,\n  \"ringSoft\": 0.21,\n  \"ringCx\": 0.26,\n  \"ringCy\": -0.3,\n  \"dotSize\": 4,\n  \"dashLenDD\": 24,\n  \"ddThresh\": 0.12,\n  \"ddBlur\": 0.68,\n  \"ddAngle\": 0,\n  \"noiseScale\": 0.0034,\n  \"noiseStr\": 1.08,\n  \"octaves\": 3,\n  \"seed\": 929,\n  \"waveFreq\": 1.8,\n  \"radCx\": -0.17,\n  \"radCy\": -0.31,\n  \"bgColor\": \"#ffffff\",\n  \"strokeColor\": \"#1a1a1a\",\n  \"opacity\": 0.69,\n  \"cWidth\": 700,\n  \"cHeight\": 900\n}/*EDITMODE-END*/;\n\nlet P = { ...TWEAK_DEFAULTS };\n\n// ─────────────────────────────────────────────\n// CONTROL BINDING\n// ─────────────────────────────────────────────\nfunction f2(v) { return parseFloat(v).toFixed(2); }\nfunction f3(v) { return parseFloat(v).toFixed(3); }\nfunction fOnOff(v) { return +v > 0.5 ? 'on' : 'off'; }\n\nfunction bindControl(id, valId, fmt) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const disp = valId ? document.getElementById(valId) : null;\n  el.value = P[id];\n  if (disp) disp.textContent = fmt ? fmt(P[id]) : P[id];\n  el.addEventListener('input', () => {\n    const v = (el.type === 'range') ? parseFloat(el.value) : el.value;\n    P[id] = v;\n    if (disp) disp.textContent = fmt ? fmt(v) : v;\n    if (id === 'seed') seedNoise(v);\n    if (id === 'cWidth' || id === 'cHeight') resizeCanvas();\n    updateVisibility();\n    draw(); persist();\n  });\n}\n\nbindControl('spacingX','spacingX_v'); bindControl('spacingY','spacingY_v');\nbindControl('jitter','jitter_v',f2);\nbindControl('dashLen','dashLen_v'); bindControl('lenVary','lenVary_v',f2);\nbindControl('minLen','minLen_v',f2); bindControl('pixelSize','pixelSize_v',f2);\nbindControl('strokeW','strokeW_v',f2);\nbindControl('roundCaps','roundCaps_v',fOnOff); bindControl('squareEl','squareEl_v',fOnOff);\nbindControl('baseAngle','baseAngle_v'); bindControl('angleRange','angleRange_v');\nbindControl('ringRadius','ringRadius_v',f2); bindControl('ringAspect','ringAspect_v',f2);\nbindControl('ringSoft','ringSoft_v',f2); bindControl('ringCx','ringCx_v',f2);\nbindControl('ringCy','ringCy_v',f2);\nbindControl('dotSize','dotSize_v',f2); bindControl('dashLenDD','dashLenDD_v',f2);\nbindControl('ddThresh','ddThresh_v',f2); bindControl('ddBlur','ddBlur_v',f2);\nbindControl('ddAngle','ddAngle_v');\nbindControl('noiseScale','noiseScale_v',f3); bindControl('noiseStr','noiseStr_v',f2);\nbindControl('octaves','octaves_v'); bindControl('seed','seed_v');\nbindControl('waveFreq','waveFreq_v',f2);\nbindControl('radCx','radCx_v',f2); bindControl('radCy','radCy_v',f2);\nbindControl('opacity','opacity_v',f2);\nbindControl('cWidth','cWidth_v'); bindControl('cHeight','cHeight_v');\n\nconst axisEl = document.getElementById('axis');\naxisEl.value = P.axis;\naxisEl.addEventListener('change', () => { P.axis = axisEl.value; draw(); persist(); });\n\nfunction bindColor(id) {\n  const el = document.getElementById(id);\n  el.value = P[id];\n  el.addEventListener('input', () => { P[id] = el.value; draw(); persist(); });\n}\nbindColor('bgColor'); bindColor('strokeColor');\n\ndocument.querySelectorAll('.chip').forEach(chip => {\n  chip.addEventListener('click', () => {\n    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));\n    chip.classList.add('active');\n    P.mode = chip.dataset.mode;\n    updateVisibility(); draw(); persist();\n  });\n});\n\nfunction updateVisibility() {\n  const m = P.mode;\n  const show = (id, vis) => {\n    const el = document.getElementById(id);\n    if (el) el.style.display = vis ? '' : 'none';\n  };\n  show('axisRow', m === 'gradient');\n  show('waveRow', m === 'wave');\n  show('radRow', m === 'radial'); show('radRow2', m === 'radial');\n  show('concentricSection', m === 'concentric');\n  show('dotdashSection', m === 'dotdash');\n  show('angleSection', !['pixel','concentric','dotdash'].includes(m));\n  // element rows\n  const isPixel = m === 'pixel';\n  const isDD = m === 'dotdash';\n  show('row_dashLen', !isPixel && !isDD);\n  show('row_lenVary', !isPixel && !isDD);\n  show('row_minLen', !isPixel && !isDD && m !== 'dotdash');\n  show('row_pixelSize', isPixel);\n  show('row_strokeW', !isPixel);\n  show('row_roundCaps', !isPixel && !isDD);\n  show('row_squareEl', isPixel);\n  // field section visibility\n  const useField = ['flow','length','wave','dotdash','pixel'].includes(m);\n  show('fieldSection', true);\n  show('noiseScale', useField || m === 'concentric');\n  show('noiseStr', useField);\n  show('octaves', useField || m === 'concentric');\n  show('seed', true);\n}\n\n// ─────────────────────────────────────────────\n// CANVAS\n// ─────────────────────────────────────────────\nconst canvas = document.getElementById('c');\nconst ctx = canvas.getContext('2d');\n\nfunction resizeCanvas() {\n  canvas.width = P.cWidth; canvas.height = P.cHeight;\n  const area = document.getElementById('canvas-area');\n  const maxW = area.clientWidth - 48, maxH = area.clientHeight - 48;\n  const scale = Math.min(1, maxW / P.cWidth, maxH / P.cHeight);\n  const wrap = document.getElementById('canvas-wrap');\n  wrap.style.transform = `scale(${scale})`;\n  wrap.style.transformOrigin = 'center center';\n  wrap.style.width = P.cWidth + 'px';\n  wrap.style.height = P.cHeight + 'px';\n}\n\n// ─────────────────────────────────────────────\n// GRID BUILDER  (shared by draw + SVG export)\n// ─────────────────────────────────────────────\nfunction buildGrid(W, H) {\n  const sx = P.spacingX, sy = P.spacingY;\n  const cols = Math.ceil(W / sx) + 1;\n  const rows = Math.ceil(H / sy) + 1;\n  const offX = (W - (cols - 1) * sx) / 2;\n  const offY = (H - (rows - 1) * sy) / 2;\n  const pts = [];\n  for (let r = 0; r < rows; r++) {\n    for (let c = 0; c < cols; c++) {\n      let px = offX + c * sx;\n      let py = offY + r * sy;\n      if (P.jitter > 0) {\n        px += (noise2(c * 0.3 + currentSeed, r * 0.3) * 2) * sx * P.jitter;\n        py += (noise2(c * 0.3, r * 0.3 + currentSeed) * 2) * sy * P.jitter;\n      }\n      pts.push({ px, py, r, c });\n    }\n  }\n  return pts;\n}\n\n// ─────────────────────────────────────────────\n// FIELD COMPUTATIONS\n// ─────────────────────────────────────────────\nfunction computeAngle(nx, ny, px, py) {\n  const base = P.baseAngle * Math.PI / 180;\n  const range = P.angleRange * Math.PI / 180;\n  const sc = P.noiseScale, str = P.noiseStr, oct = P.octaves;\n  switch (P.mode) {\n    case 'gradient': {\n      let t;\n      if (P.axis === 'y') t = ny;\n      else if (P.axis === 'x') t = nx;\n      else if (P.axis === 'xy') t = (nx + ny) / 2;\n      else t = Math.min(1, Math.hypot(nx - 0.5, ny - 0.5) * 2);\n      return base + (t - 0.5) * range;\n    }\n    case 'flow': {\n      const eps = 1;\n      const n1 = fbm(px * sc + currentSeed * 0.1, py * sc + currentSeed * 0.07, oct);\n      const dny = fbm(px * sc + currentSeed * 0.1, (py + eps) * sc + currentSeed * 0.07, oct);\n      const dnx = fbm((px + eps) * sc + currentSeed * 0.1, py * sc + currentSeed * 0.07, oct);\n      const curlX = (dny - n1) / (eps * sc);\n      const curlY = -(dnx - n1) / (eps * sc);\n      return Math.atan2(curlY, curlX) * str + base;\n    }\n    case 'length': return base;\n    case 'radial': {\n      const cx = (P.radCx * 0.5 + 0.5) * (P.cWidth || 700);\n      const cy = (P.radCy * 0.5 + 0.5) * (P.cHeight || 900);\n      return Math.atan2(py - cy, px - cx) + base;\n    }\n    case 'wave': {\n      const n = fbm(px * sc + currentSeed, py * sc + currentSeed, oct);\n      return base + Math.sin(nx * Math.PI * P.waveFreq + n * str * 3) * (range * 0.5)\n                  + Math.cos(ny * Math.PI * P.waveFreq * 0.7 + n * str * 2) * (range * 0.5);\n    }\n    case 'concentric': {\n      // Tangent to concentric ellipses centered on ringCx/Cy\n      const cx = (0.5 + P.ringCx) * (P.cWidth || 700);\n      const cy = (0.5 + P.ringCy) * (P.cHeight || 900);\n      return Math.atan2((py - cy) / P.ringAspect, px - cx) + Math.PI / 2 + base;\n    }\n    default: return base;\n  }\n}\n\nfunction computeLengthMult(nx, ny, px, py) {\n  const sc = P.noiseScale, oct = P.octaves;\n  switch (P.mode) {\n    case 'length': {\n      const n = (fbm(px * sc * 2 + currentSeed, py * sc * 2 + currentSeed, oct) + 0.5);\n      return Math.max(P.minLen, Math.min(1, n));\n    }\n    case 'concentric': {\n      // Distance from elliptical ring\n      const cx = (0.5 + P.ringCx) * (P.cWidth || 700);\n      const cy = (0.5 + P.ringCy) * (P.cHeight || 900);\n      const W = P.cWidth || 700, H = P.cHeight || 900;\n      const normDist = Math.hypot((px - cx) / W, (py - cy) / (H * P.ringAspect));\n      const distFromRing = Math.abs(normDist - P.ringRadius);\n      // Shortest at ring, longer far away\n      const t = Math.min(1, distFromRing / P.ringSoft);\n      return Math.max(P.minLen, t);\n    }\n    default: {\n      if (P.lenVary > 0) {\n        const n = (fbm(px * sc + currentSeed + 50, py * sc + currentSeed + 50, 2) * 0.5 + 0.5);\n        return Math.max(P.minLen, 1 - P.lenVary + n * P.lenVary * P.noiseStr);\n      }\n      return 1;\n    }\n  }\n}\n\n// Dot/Dash field value: 0=dot, 1=dash\nfunction computeDotDash(nx, ny, px, py) {\n  const sc = P.noiseScale, str = P.noiseStr, oct = P.octaves;\n  const n = fbm(px * sc + currentSeed, py * sc + currentSeed, oct);\n  return (n * str - P.ddThresh) / Math.max(0.01, P.ddBlur);\n}\n\n// Pixel size field: returns 0..1\nfunction computePixelSize(nx, ny, px, py) {\n  const sc = P.noiseScale, str = P.noiseStr, oct = P.octaves;\n  const n = fbm(px * sc + currentSeed, py * sc + currentSeed, oct);\n  return Math.max(0, Math.min(1, (n * str + 0.5)));\n}\n\n// ─────────────────────────────────────────────\n// DRAW (canvas)\n// ─────────────────────────────────────────────\nfunction draw() {\n  const W = canvas.width, H = canvas.height;\n  ctx.clearRect(0, 0, W, H);\n  ctx.fillStyle = P.bgColor;\n  ctx.fillRect(0, 0, W, H);\n  ctx.globalAlpha = P.opacity;\n\n  const pts = buildGrid(W, H);\n\n  if (P.mode === 'pixel') {\n    ctx.fillStyle = P.strokeColor;\n    const sq = P.squareEl > 0.5;\n    const sx = P.spacingX, sy = P.spacingY;\n    for (const { px, py } of pts) {\n      const nx = px / W, ny = py / H;\n      const t = computePixelSize(nx, ny, px, py);\n      const size = t * Math.min(sx, sy) * P.pixelSize;\n      if (size < 0.5) continue;\n      ctx.beginPath();\n      if (sq) {\n        ctx.rect(px - size / 2, py - size / 2, size, size);\n      } else {\n        ctx.arc(px, py, size / 2, 0, Math.PI * 2);\n      }\n      ctx.fill();\n    }\n  } else if (P.mode === 'dotdash') {\n    const ddAng = P.ddAngle * Math.PI / 180;\n    const cos = Math.cos(ddAng), sin = Math.sin(ddAng);\n    const halfL = P.dashLenDD / 2;\n    const dotR = P.dotSize / 2;\n    ctx.strokeStyle = P.strokeColor;\n    ctx.fillStyle = P.strokeColor;\n    ctx.lineWidth = P.strokeW;\n    ctx.lineCap = 'round';\n    for (const { px, py } of pts) {\n      const nx = px / W, ny = py / H;\n      const t = computeDotDash(nx, ny, px, py);\n      // t<0 = dot, t>1 = full dash, in between = morph\n      const clamped = Math.max(0, Math.min(1, t));\n      if (clamped < 0.05) {\n        // Pure dot\n        ctx.beginPath();\n        ctx.arc(px, py, dotR, 0, Math.PI * 2);\n        ctx.fill();\n      } else {\n        // Dash (length grows with t)\n        const len = halfL * clamped;\n        ctx.beginPath();\n        ctx.moveTo(px - cos * len, py - sin * len);\n        ctx.lineTo(px + cos * len, py + sin * len);\n        ctx.stroke();\n      }\n    }\n  } else {\n    // Line-based modes\n    ctx.strokeStyle = P.strokeColor;\n    ctx.lineWidth = P.strokeW;\n    ctx.lineCap = P.roundCaps > 0.5 ? 'round' : 'butt';\n    ctx.beginPath();\n    for (const { px, py } of pts) {\n      const nx = px / W, ny = py / H;\n      const angle = computeAngle(nx, ny, px, py);\n      const lm = computeLengthMult(nx, ny, px, py);\n      const len = (P.dashLen / 2) * lm;\n      if (len < 0.5) continue;\n      const cos = Math.cos(angle), sin = Math.sin(angle);\n      ctx.moveTo(px - cos * len, py - sin * len);\n      ctx.lineTo(px + cos * len, py + sin * len);\n    }\n    ctx.stroke();\n  }\n  ctx.globalAlpha = 1;\n}\n\n// ─────────────────────────────────────────────\n// EXPORT PNG\n// ─────────────────────────────────────────────\nfunction exportPNG() {\n  const link = document.createElement('a');\n  link.download = `pattern-${P.mode}-${Date.now()}.png`;\n  link.href = canvas.toDataURL('image/png');\n  link.click();\n}\n\n// ─────────────────────────────────────────────\n// EXPORT SVG\n// ─────────────────────────────────────────────\nfunction exportSVG() {\n  const W = P.cWidth, H = P.cHeight;\n  seedNoise(P.seed);\n  const pts = buildGrid(W, H);\n  const bg = P.bgColor;\n  const sc = P.strokeColor;\n  const op = P.opacity;\n  let els = [];\n\n  if (P.mode === 'pixel') {\n    const sq = P.squareEl > 0.5;\n    const sx = P.spacingX, sy = P.spacingY;\n    for (const { px, py } of pts) {\n      const nx = px / W, ny = py / H;\n      const t = computePixelSize(nx, ny, px, py);\n      const size = t * Math.min(sx, sy) * P.pixelSize;\n      if (size < 0.5) continue;\n      if (sq) {\n        els.push(`<rect x=\"${(px - size/2).toFixed(2)}\" y=\"${(py - size/2).toFixed(2)}\" width=\"${size.toFixed(2)}\" height=\"${size.toFixed(2)}\" fill=\"${sc}\"/>`);\n      } else {\n        els.push(`<circle cx=\"${px.toFixed(2)}\" cy=\"${py.toFixed(2)}\" r=\"${(size/2).toFixed(2)}\" fill=\"${sc}\"/>`);\n      }\n    }\n  } else if (P.mode === 'dotdash') {\n    const ddAng = P.ddAngle * Math.PI / 180;\n    const cos = Math.cos(ddAng), sin = Math.sin(ddAng);\n    const halfL = P.dashLenDD / 2;\n    const dotR = P.dotSize / 2;\n    for (const { px, py } of pts) {\n      const nx = px / W, ny = py / H;\n      const t = computeDotDash(nx, ny, px, py);\n      const clamped = Math.max(0, Math.min(1, t));\n      if (clamped < 0.05) {\n        els.push(`<circle cx=\"${px.toFixed(2)}\" cy=\"${py.toFixed(2)}\" r=\"${dotR.toFixed(2)}\" fill=\"${sc}\"/>`);\n      } else {\n        const len = halfL * clamped;\n        const x1 = (px - cos * len).toFixed(2), y1 = (py - sin * len).toFixed(2);\n        const x2 = (px + cos * len).toFixed(2), y2 = (py + sin * len).toFixed(2);\n        els.push(`<line x1=\"${x1}\" y1=\"${y1}\" x2=\"${x2}\" y2=\"${y2}\" stroke=\"${sc}\" stroke-width=\"${P.strokeW}\" stroke-linecap=\"round\"/>`);\n      }\n    }\n  } else {\n    const cap = P.roundCaps > 0.5 ? 'round' : 'butt';\n    for (const { px, py } of pts) {\n      const nx = px / W, ny = py / H;\n      const angle = computeAngle(nx, ny, px, py);\n      const lm = computeLengthMult(nx, ny, px, py);\n      const len = (P.dashLen / 2) * lm;\n      if (len < 0.5) continue;\n      const cos = Math.cos(angle), sin = Math.sin(angle);\n      const x1 = (px - cos * len).toFixed(2), y1 = (py - sin * len).toFixed(2);\n      const x2 = (px + cos * len).toFixed(2), y2 = (py + sin * len).toFixed(2);\n      els.push(`<line x1=\"${x1}\" y1=\"${y1}\" x2=\"${x2}\" y2=\"${y2}\" stroke=\"${sc}\" stroke-width=\"${P.strokeW}\" stroke-linecap=\"${cap}\"/>`);\n    }\n  }\n\n  const svg = `<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"${W}\" height=\"${H}\" viewBox=\"0 0 ${W} ${H}\">\n  <rect width=\"${W}\" height=\"${H}\" fill=\"${bg}\"/>\n  <g opacity=\"${op}\">\n    ${els.join('\\n    ')}\n  <\u002Fg>\n<\u002Fsvg>`;\n\n  const blob = new Blob([svg], { type: 'image/svg+xml' });\n  const link = document.createElement('a');\n  link.download = `pattern-${P.mode}-${Date.now()}.svg`;\n  link.href = URL.createObjectURL(blob);\n  link.click();\n}\n\n// ─────────────────────────────────────────────\n// RANDOMIZE\n// ─────────────────────────────────────────────\nfunction rnd(min, max, decimals = 0) {\n  const v = Math.random() * (max - min) + min;\n  return decimals > 0 ? +v.toFixed(decimals) : Math.round(v);\n}\nfunction pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }\n\n// Shared base params always randomized\nfunction randomBase() {\n  P.seed = rnd(0, 999);\n  P.jitter = rnd(0, 0.35, 2);\n  P.spacingX = rnd(10, 55);\n  P.spacingY = rnd(10, 55);\n  P.opacity = rnd(0.5, 1, 2);\n}\n\nconst modeRandomizers = {\n  gradient() {\n    randomBase();\n    P.dashLen = rnd(6, 40, 1);\n    P.lenVary = rnd(0, 0.7, 2);\n    P.minLen = rnd(0, 0.3, 2);\n    P.strokeW = rnd(0.5, 3, 1);\n    P.roundCaps = pick([0, 1]);\n    P.baseAngle = rnd(-180, 180);\n    P.angleRange = rnd(20, 340);\n    P.axis = pick(['x', 'y', 'xy', 'radial']);\n    P.noiseScale = rnd(0.002, 0.018, 4);\n    P.noiseStr = rnd(0.3, 2.5, 2);\n  },\n  flow() {\n    randomBase();\n    P.spacingX = rnd(8, 40);\n    P.spacingY = rnd(8, 40);\n    P.dashLen = rnd(8, 35, 1);\n    P.lenVary = rnd(0, 0.5, 2);\n    P.minLen = rnd(0, 0.2, 2);\n    P.strokeW = rnd(0.4, 2, 1);\n    P.roundCaps = pick([0, 0, 1]);\n    P.baseAngle = rnd(-180, 180);\n    P.angleRange = rnd(30, 360);\n    P.noiseScale = rnd(0.002, 0.014, 4);\n    P.noiseStr = rnd(0.4, 3, 2);\n    P.octaves = rnd(2, 6);\n  },\n  length() {\n    randomBase();\n    P.dashLen = rnd(10, 50, 1);\n    P.minLen = rnd(0, 0.15, 2);\n    P.strokeW = rnd(0.5, 2.5, 1);\n    P.roundCaps = pick([0, 1]);\n    P.baseAngle = rnd(-180, 180);\n    P.noiseScale = rnd(0.003, 0.018, 4);\n    P.noiseStr = rnd(0.8, 3, 2);\n    P.octaves = rnd(2, 6);\n  },\n  radial() {\n    randomBase();\n    P.dashLen = rnd(8, 38, 1);\n    P.lenVary = rnd(0, 0.6, 2);\n    P.minLen = rnd(0, 0.25, 2);\n    P.strokeW = rnd(0.5, 2.5, 1);\n    P.roundCaps = pick([0, 1]);\n    P.baseAngle = rnd(-180, 180);\n    P.radCx = rnd(-0.6, 0.6, 2);\n    P.radCy = rnd(-0.6, 0.6, 2);\n    P.noiseScale = rnd(0.003, 0.015, 4);\n    P.noiseStr = rnd(0.5, 2.5, 2);\n  },\n  wave() {\n    randomBase();\n    P.dashLen = rnd(8, 35, 1);\n    P.lenVary = rnd(0, 0.5, 2);\n    P.minLen = rnd(0, 0.2, 2);\n    P.strokeW = rnd(0.4, 2.5, 1);\n    P.roundCaps = pick([0, 1]);\n    P.baseAngle = rnd(-180, 180);\n    P.angleRange = rnd(30, 300);\n    P.waveFreq = rnd(0.5, 9, 1);\n    P.noiseScale = rnd(0.002, 0.015, 4);\n    P.noiseStr = rnd(0.5, 3, 2);\n    P.octaves = rnd(1, 5);\n  },\n  concentric() {\n    randomBase();\n    P.dashLen = rnd(6, 30, 1);\n    P.minLen = rnd(0, 0.1, 2);\n    P.strokeW = rnd(0.5, 2.5, 1);\n    P.roundCaps = pick([0, 1]);\n    P.baseAngle = rnd(-180, 180);\n    P.ringRadius = rnd(0.08, 0.65, 2);\n    P.ringAspect = rnd(0.3, 2.8, 2);\n    P.ringSoft = rnd(0.05, 0.6, 2);\n    P.ringCx = rnd(-0.35, 0.35, 2);\n    P.ringCy = rnd(-0.35, 0.35, 2);\n    P.noiseScale = rnd(0.002, 0.012, 4);\n    P.octaves = rnd(2, 5);\n  },\n  dotdash() {\n    randomBase();\n    P.spacingX = rnd(10, 45);\n    P.spacingY = rnd(10, 45);\n    P.dotSize = rnd(1, 6, 1);\n    P.dashLenDD = rnd(6, 35, 1);\n    P.strokeW = rnd(0.5, 3, 1);\n    P.ddThresh = rnd(-0.6, 0.6, 2);\n    P.ddBlur = rnd(0.1, 0.9, 2);\n    P.ddAngle = rnd(-90, 90);\n    P.noiseScale = rnd(0.002, 0.016, 4);\n    P.noiseStr = rnd(0.5, 2.5, 2);\n    P.octaves = rnd(1, 5);\n  },\n  pixel() {\n    randomBase();\n    P.spacingX = rnd(6, 40);\n    P.spacingY = rnd(6, 40);\n    P.pixelSize = rnd(0.3, 1.8, 2);\n    P.squareEl = pick([0, 1]);\n    P.noiseScale = rnd(0.003, 0.02, 4);\n    P.noiseStr = rnd(0.5, 3, 2);\n    P.octaves = rnd(1, 6);\n  }\n};\n\nfunction randomizeMode(mode) {\n  P.mode = mode;\n  if (modeRandomizers[mode]) modeRandomizers[mode]();\n  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.mode === mode));\n  syncAllControls();\n  seedNoise(P.seed);\n  updateVisibility();\n  draw();\n  persist();\n}\n\nfunction randomizeMix() {\n  const modes = Object.keys(modeRandomizers);\n  randomizeMode(pick(modes));\n}\n\nfunction syncAllControls() {\n  const fmtMap = {\n    jitter: f2, lenVary: f2, minLen: f2, pixelSize: f2, strokeW: f2,\n    roundCaps: fOnOff, squareEl: fOnOff, noiseStr: f2, radCx: f2, radCy: f2,\n    opacity: f2, waveFreq: f2, noiseScale: f3,\n    ringRadius: f2, ringAspect: f2, ringSoft: f2, ringCx: f2, ringCy: f2,\n    dotSize: f2, dashLenDD: f2, ddThresh: f2, ddBlur: f2\n  };\n  Object.keys(P).forEach(k => {\n    const el = document.getElementById(k);\n    if (!el) return;\n    if (el.type === 'range') el.value = P[k];\n    const vEl = document.getElementById(k + '_v');\n    if (vEl) vEl.textContent = fmtMap[k] ? fmtMap[k](P[k]) : P[k];\n  });\n  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.mode === P.mode));\n  const axEl = document.getElementById('axis');\n  if (axEl) axEl.value = P.axis;\n}\n\n// ─────────────────────────────────────────────\n// PERSIST\n// ─────────────────────────────────────────────\nfunction persist() {\n  try { localStorage.setItem('patternGen_v2', JSON.stringify(P)); } catch(e){}\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: P }, '*');\n}\n\n// ─────────────────────────────────────────────\n// TWEAKS HOST\n// ─────────────────────────────────────────────\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode' || e.data?.type === '__deactivate_edit_mode') {}\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n// ─────────────────────────────────────────────\n// INIT\n// ─────────────────────────────────────────────\ntry {\n  const saved = localStorage.getItem('patternGen_v2');\n  if (saved) { Object.assign(P, JSON.parse(saved)); }\n} catch(e) {}\n\nseedNoise(P.seed);\nsyncAllControls();\nresizeCanvas();\nupdateVisibility();\ndraw();\n\nwindow.addEventListener('resize', () => { resizeCanvas(); });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
