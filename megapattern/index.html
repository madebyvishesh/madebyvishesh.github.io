<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Meshic</title>
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=https://meshic.app/" />
    <link rel="canonical" href="https://meshic.app/" />
    <script>
      const target = new URL("https://meshic.app/")
      const oldPrefix = "/megapattern"
      const currentPath = window.location.pathname
      const extraPath = currentPath.startsWith(oldPrefix)
        ? currentPath.slice(oldPrefix.length).replace(/^\/+/, "")
        : ""

      if (extraPath) {
        target.pathname = `/${extraPath}`
      }

      target.search = window.location.search
      target.hash = window.location.hash
      window.location.replace(target.toString())
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://meshic.app/">Meshic</a>.</p>
  </body>
</html>
